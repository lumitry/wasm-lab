<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS vs Pyodide Benchmark</title>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.23.4/full/pyodide.js"></script>
</head>
<body>
    <h1>JavaScript vs Python (Pyodide) Benchmark</h1>
    <button id="run">Run Benchmark</button>
    <pre id="output"></pre>

    <script>
        // Load Pyodide once
        let pyodideReady = (async () => {
            let pyodide = await loadPyodide();
            await pyodide.loadPackage("numpy");
            return pyodide;
        })();

        // JS factorial (loop version)
        function jsFactorial(n) {
            let result = 1;
            for (let i = 2; i <= n; i++) {
                result *= i;
            }
            return result;
        }
        //Create Matrix
        function createMatrix(n) {
            const mat = [];
            for (let i = 0; i < n; i++) {
                mat[i] = [];
                for (let j = 0; j < n; j++) {
                    mat[i][j] = Math.random();
                }
            }
            return mat;
        }
        //Multiply matrixes
        function multiplyMatrices(A, B, n) {
            const result = Array.from({ length: n }, () => Array(n).fill(0));

            for (let i = 0; i < n; i++) {
                for (let j = 0; j < n; j++) {
                    for (let k = 0; k < n; k++) {
                        result[i][j] += A[i][k] * B[k][j];
                    }
                }
            }
            return result;
        }
        async function runBenchmark() {
            //size of our matrix
            const size = 80;
            const output = document.getElementById("output");
            output.textContent = "Running...\n";

            const number = 10;
            const iterations = 500000;

            // ---- JavaScript Benchmark ----
            const jsStart = performance.now();

            let jsResult;
            for (let i = 0; i < iterations; i++) {
                jsResult = jsFactorial(number);
            }

            const jsEnd = performance.now();
            const jsTime = (jsEnd - jsStart).toFixed(2);

            // ---- Pyodide Benchmark ----
            const pyodide = await pyodideReady;

            const pythonCode = `
                import time

                def factorial(n):
                    result = 1
                    for i in range(2, n + 1):
                        result *= i
                    return result

                number = ${number}
                iterations = ${iterations}

                start = time.perf_counter()

                for _ in range(iterations):
                    result = factorial(number)

                end = time.perf_counter()

                (result, end - start)
                 `;

            const [pyResult, pyTime] = pyodide.runPython(pythonCode).toJs();;
            
            const numpyCode = `
                import time
                import numpy as np

                n = ${size}

                A = np.random.rand(n, n)
                B = np.random.rand(n, n)

                start = time.perf_counter()
                C = A @ B
                end = time.perf_counter()

                end - start
                `;
            //Python code for matrix multiplication and time
            const pyNumpyTime = pyodide.runPython(numpyCode);
            const pyNumpyTimeMs = (pyNumpyTime * 1000).toFixed(2);
            
             // ---- JS Matrix Benchmark ----
            const A = createMatrix(size);
            const B = createMatrix(size);

            const jsMatStart = performance.now();
            multiplyMatrices(A, B, size);
            const jsMatEnd = performance.now();
            const jsMatTime = (jsMatEnd - jsMatStart).toFixed(2);

            //parse them from their strings
            const jsMatTimeNum = parseFloat(jsMatTime);
            const numpyVsJs = (pyNumpyTime * 1000 / jsMatTimeNum).toFixed(2);
            output.textContent =
                `Factorial(${number}) repeated ${iterations} times

                JavaScript:
                Time: ${jsTime} ms

                Python (Pyodide):
                Time: ${(pyTime * 1000).toFixed(2)} ms

                Slowdown: ${((pyTime * 1000) / jsTime).toFixed(1)}x slower

                ----------------------------

                Matrix Multiplication (${size}x${size})

                JavaScript (loops):
                Time: ${jsMatTime} ms

                Python (NumPy):
                Time: ${pyNumpyTimeMs} ms

                NumPy vs JS: ${(numpyVsJs)}x
                `;
            }
                document.getElementById("run").addEventListener("click", runBenchmark);
    </script>
</body>
</html>
